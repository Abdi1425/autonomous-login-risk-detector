<!DOCTYPE html>
<html>
<head>
    <title>Autonomous Login Risk Detector</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <h1>Login Risk Checker</h1>
    <form id="loginForm">
        Failed Attempts: <input type="number" id="attempts" required><br>
        Login Hour (0-23): <input type="number" id="hour" required><br>
        Location Risk (0-1): <input type="number" step="0.1" id="location" required><br>
        <button type="button" onclick="submitLogin()">Check Risk</button>
    </form>
    <div id="result"></div>

    <script src="assets/js/app.js"></script>
</body>
</html>
